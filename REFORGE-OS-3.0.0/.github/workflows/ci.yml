name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20.x'
  RUST_VERSION: 'stable'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'apps/Reforge os/package-lock.json'
      
      - name: Install dependencies
        working-directory: 'apps/Reforge os'
        run: npm ci
      
      - name: Run ESLint
        working-directory: 'apps/Reforge os'
        run: npm run lint || echo "Linting not configured yet"
      
      - name: Run TypeScript type check
        working-directory: 'apps/Reforge os'
        run: npx tsc --noEmit

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'apps/Reforge os/package-lock.json'
      
      - name: Install dependencies
        working-directory: 'apps/Reforge os'
        run: npm ci
      
      - name: Run tests
        working-directory: 'apps/Reforge os'
        run: npm run test || echo "Tests not configured yet"
      
      - name: Generate coverage report
        working-directory: 'apps/Reforge os'
        run: npm run test:coverage || echo "Coverage not configured yet"

  build:
    name: Build Application
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'apps/Reforge os/package-lock.json'
      
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          override: true
      
      - name: Install dependencies
        working-directory: 'apps/Reforge os'
        run: npm ci
      
      - name: Build application
        working-directory: 'apps/Reforge os'
        run: npm run build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Run npm audit
        working-directory: 'apps/Reforge os'
        run: npm audit --audit-level=moderate || true
      
      - name: Run cargo audit (if available)
        working-directory: 'apps/Reforge os/src-tauri'
        run: |
          cargo install cargo-audit || true
          cargo audit || true
