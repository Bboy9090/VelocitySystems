<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Custodian Vault Icon - Magenta + Gold -->
  <defs>
    <linearGradient id="vaultGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3DBB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F5A524;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <filter id="vaultGlow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Vault Door -->
  <rect x="16" y="20" width="32" height="36" rx="4" fill="#161A1F" stroke="url(#vaultGradient)" stroke-width="2" filter="url(#vaultGlow)"/>
  
  <!-- Keyhole -->
  <circle cx="32" cy="38" r="6" fill="none" stroke="url(#vaultGradient)" stroke-width="2"/>
  <rect x="30" y="44" width="4" height="8" fill="url(#vaultGradient)"/>
  
  <!-- Lock Bars (Top) -->
  <line x1="20" y1="24" x2="44" y2="24" stroke="url(#vaultGradient)" stroke-width="1.5" opacity="0.6"/>
  <line x1="20" y1="28" x2="44" y2="28" stroke="url(#vaultGradient)" stroke-width="1.5" opacity="0.6"/>
</svg>