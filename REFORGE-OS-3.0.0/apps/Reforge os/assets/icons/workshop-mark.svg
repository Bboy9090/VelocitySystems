<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Bobby's Workshop Mark - Neon Cyan + Tape Yellow -->
  <defs>
    <linearGradient id="workshopGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DD4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD400;stop-opacity:0.9" />
    </linearGradient>
    <filter id="workshopGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Wrench/Tool Symbol -->
  <path d="M 32 12 L 40 20 L 36 24 L 44 32 L 40 36 L 32 28 L 28 32 L 20 24 L 24 20 Z" 
        fill="url(#workshopGradient)" 
        filter="url(#workshopGlow)"/>
  
  <!-- Workshop "W" Letter -->
  <path d="M 20 40 L 24 52 L 28 40 L 32 52 L 36 40 L 40 52 L 44 40" 
        stroke="url(#workshopGradient)" 
        stroke-width="2.5" 
        stroke-linecap="round" 
        fill="none"
        filter="url(#workshopGlow)"/>
</svg>