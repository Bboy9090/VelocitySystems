name: diagnostic_repair_app
description: A cross-platform diagnostic and repair app for Android and iOS devices
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.2
  
  # State Management
  provider: ^6.0.5
  
  # HTTP Client
  http: ^1.1.0
  dio: ^5.3.3
  
  # Real-time Communication
  socket_io_client: ^2.0.3+1
  
  # QR/Barcode Scanning
  qr_code_scanner: ^1.0.1
  mobile_scanner: ^3.5.2
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Charts for diagnostics
  fl_chart: ^0.64.0
  
  # Permission handling
  permission_handler: ^11.0.1
  
  # Device info
  device_info_plus: ^9.1.0
  
  # URL launcher
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
